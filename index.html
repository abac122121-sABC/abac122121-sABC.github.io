<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>| Aesomew</title>
<link rel="icon" href="./favicon.ico">
<link rel="shortcut icon" href="favicon.ico">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{min-height:100vh;background:#f5f7fa;padding-top:50px;font-family:"Microsoft YaHei",sans-serif}
.title-box{background:#fff;padding:20px 40px;border-radius:16px;box-shadow:0 4px 24px rgba(0,0,0,0.08);width:fit-content;margin:0 auto;display:flex;align-items:center;gap:30px}.main-title{background:linear-gradient(135deg,#4facfe,#00f2fe);-webkit-background-clip:text;background-clip:text;color:transparent;font-size:60px;font-weight:900;text-shadow:0 8px 20px rgba(79,172,254,0.3);letter-spacing:4px;cursor:default}.c{width:70px;height:70px;transform-style:preserve-3d;animation:r 8s linear infinite}
@keyframes r{to{transform:rotateY(360deg) rotateX(360deg)}}.c>div{position:absolute;width:70px;height:70px;border:4px solid; border-image:linear-gradient(135deg,#4facfe,#00f2fe) 1;background:linear-gradient(135deg,rgba(79,172,254,0.2),rgba(0,242,254,0.2))}.f{transform:translateZ(35px)}.b{transform:translateZ(-35px)}.l{transform:translateX(-35px) rotateY(-90deg)}.r{transform:translateX(35px) rotateY(90deg)}.u{transform:translateY(-35px) rotateX(90deg)}.d{transform:translateY(35px) rotateX(-90deg)}
</style>
</head>
<body>
<div class="title-box">
<div class="c"><div class="f"></div><div class="b"></div><div class="l"></div><div class="r"></div><div class="u"></div><div class="d"></div></div>
<h1 class="main-title">Aesomew</h1>
</div>
</body>
</html>
